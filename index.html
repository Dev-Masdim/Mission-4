<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
  </head>
  <body>
    <!-- Header start -->
    <div class="header">
      <div class="logo">
        <img src="assets/img/KAI.jpeg" alt="PT KERETA API INDONESIA" />
      </div>
      <div class="profile">
        <p>Nama: Dimas Aryana Putra</p>
        <p>Jabatan: Web Developer</p>
      </div>
      <div class="time">
        <p>Hari: Selasa</p>
        <p>Tanggal: 8 Mei</p>
      </div>
    </div>
    <!-- Header End -->
    <!-- Input Start -->
    <div class="input">
      <h1>TAMBAH TUGAS BARU</h1>
      <div class="input-row">
        <input
          id="todo-input"
          class="input-text"
          placeholder="What will you do today ?"
        />
      </div>
      <div class="level">
        <p>Level Prioritas:</p>
        <input type="checkbox" class="checkbox" id="low" />Low
        <input type="checkbox" class="checkbox" id="medium" />Medium
        <input type="checkbox" class="checkbox" id="high" />High
      </div>
      <button id="btn-list" class="btn-list">Add</button>
    </div>

    <!-- Input End -->
  </body>
</html>
