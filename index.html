<!doctype html>
<html lang="id">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard To Do List</title>
  </head>
  <body>
    <!-- Header start -->
    <div class="header">
      <div class="logo">
        <img src="assets/img/KAI.jpeg" alt="Logo" width="100" />
      </div>
      <div class="profile">
        <p>Nama: Dimas Aryana Putra</p>
        <p>Jabatan: Web Developer</p>
      </div>
      <div class="time">
        <p id="hari-ini">Hari: -</p>
        <p id="tanggal-ini">Tanggal: -</p>
      </div>
    </div>
    <div class="input-section">
      <h2>TAMBAH TUGAS BARU</h2>
      <div class="input-row">
        <textarea
          id="todo-input"
          class="input-text"
          placeholder="Tuliskan tugas Anda di sini..."
        ></textarea>
      </div>
      <div class="level">
        <p>Level Prioritas:</p>
        <input type="radio" name="priority" value="Low" id="low" />
        <label for="low">Low</label>
        <input type="radio" name="priority" value="Medium" id="medium" />
        <label for="medium">Medium</label>
        <input type="radio" name="priority" value="High" id="high" />
        <label for="high">High</label>
      </div>
      <button id="btn-submit" class="btn-submit">Submit</button>
    </div>
    <div class="table-section">
      <h2>Tugas yang Sedang / Akan Dikerjakan</h2>
      <div class="table-container">
        <table id="todo-table">
          <thead>
            <tr>
              <th>Cek</th>
              <th>Tugas</th>
              <th>Prioritas</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="todo-body"></tbody>
        </table>
      </div>
    </div>

    <div class="table-section">
      <h2>Tugas yang Selesai</h2>
      <div class="table-container">
        <table id="done-table">
          <thead>
            <tr>
              <th>Cek</th>
              <th>Tugas</th>
              <th>Prioritas</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="done-body"></tbody>
        </table>
      </div>
      <button id="btn-delete-all" class="btn-delete-all">Delete All</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
